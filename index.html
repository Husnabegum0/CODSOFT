<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartCalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg"></div>

  <main class="wrapper">
    <div class="brand">
      <span class="brand-name">SmartCalc</span>
      <span class="brand-dot">·</span>
    </div>

    <div class="calculator">
      <div class="display">
        <div class="expr" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="buttons">
        <button class="btn util span2" data-action="clear">AC</button>
        <button class="btn util"       data-action="sign">+/−</button>
        <button class="btn op"         data-action="percent">%</button>
        <button class="btn op"         data-action="divide">÷</button>

        <button class="btn num" data-value="7">7</button>
        <button class="btn num" data-value="8">8</button>
        <button class="btn num" data-value="9">9</button>
        <button class="btn op"  data-action="multiply">×</button>

        <button class="btn num" data-value="4">4</button>
        <button class="btn num" data-value="5">5</button>
        <button class="btn num" data-value="6">6</button>
        <button class="btn op"  data-action="subtract">−</button>

        <button class="btn num" data-value="1">1</button>
        <button class="btn num" data-value="2">2</button>
        <button class="btn num" data-value="3">3</button>
        <button class="btn op"  data-action="add">+</button>

        <button class="btn num span2" data-value="0">0</button>
        <button class="btn num"       data-value=".">.</button>
        <button class="btn eq"        data-action="equals">=</button>
      </div>
    </div>

    <p class="hint">keyboard ready ✦</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
